<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login | Smart Inventory</title>

    <link rel="stylesheet" href="/static/css/login.css">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

</head>

<body>

<div class="login-container">

    <!-- Left Panel -->

    <div class="left-panel">

        <h1>Smart Inventory</h1>

        <p>
            Manage inventory smarter with AI powered demand forecasting,
            analytics and stock optimization.
        </p>

    </div>

    <!-- Right Panel -->

    <div class="right-panel">

        <div class="login-box">

            <h2>Welcome Back</h2>

            <p class="subtitle">
                Login to continue
            </p>

            <form id="loginForm">

                <label>Email Address</label>

                <input
                    type="email"
                    id="email"
                    placeholder="Enter your email"
                    required
                >

                <label>Password</label>

                <div class="password-box">

                    <input
                        type="password"
                        id="password"
                        placeholder="Enter your password"
                        required
                    >

                    <i
                        id="togglePassword"
                        class="bi bi-eye eye-btn">
                    </i>

                </div>

                <div class="forgot">

                    <a href="/forgot-password">
                        Forgot Password?
                    </a>

                </div>

                <p id="loginError"></p>

                <button
                    id="loginBtn"
                    type="submit">

                    Login

                </button>

            </form>

            <div class="signup">

                Don't have an account?

                <a href="/register">

                    Create Account

                </a>

            </div>

        </div>

    </div>

</div>

<script>

const form = document.getElementById("loginForm");
const loginBtn = document.getElementById("loginBtn");
const errorBox = document.getElementById("loginError");

const passwordInput = document.getElementById("password");
const togglePassword = document.getElementById("togglePassword");

/* Show / Hide Password */

togglePassword.addEventListener("click",()=>{

    if(passwordInput.type==="password"){

        passwordInput.type="text";

        togglePassword.classList.remove("bi-eye");
        togglePassword.classList.add("bi-eye-slash");

    }else{

        passwordInput.type="password";

        togglePassword.classList.remove("bi-eye-slash");
        togglePassword.classList.add("bi-eye");

    }

});

/* Login */

form.addEventListener("submit",async(e)=>{

    e.preventDefault();

    errorBox.style.display="none";

    loginBtn.disabled=true;
    loginBtn.innerText="Logging in...";

    try{

        const response = await fetch("/api/login",{

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({

                email:document.getElementById("email").value.trim(),

                password:passwordInput.value

            })

        });

        const result = await response.json();

        if(response.ok){

            loginBtn.innerText="Redirecting...";

            window.location.href="/dashboard";

        }

        else{

            errorBox.style.display="block";
            errorBox.innerText=result.detail || "Invalid Email or Password";

            loginBtn.disabled=false;
            loginBtn.innerText="Login";

        }

    }

    catch(err){

        errorBox.style.display="block";
        errorBox.innerText="Server not responding.";

        loginBtn.disabled=false;
        loginBtn.innerText="Login";

    }

});

</script>

</body>
</html>
