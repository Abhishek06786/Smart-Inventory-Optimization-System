<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Reset Password | Smart Inventory</title>

<link rel="stylesheet" href="/static/css/forgot_password.css">

<link
rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

</head>

<body>

<div class="page">

    <!-- Left Side -->

    <div class="left-panel">

        <div class="brand">

            <h1>Smart Inventory</h1>

            <p>
                Secure Password Recovery
            </p>

            <div class="info">

                <i class="bi bi-shield-lock-fill"></i>

                <h2>
                    Recover your account securely
                </h2>

                <span>

                    A verification code will be sent to your registered email.

                </span>

            </div>

        </div>

    </div>

    <!-- Right Side -->

    <div class="right-panel">

        <div class="card">

            <div class="icon">

                <i class="bi bi-envelope-lock-fill"></i>

            </div>

            <h2>

                Forgot Password

            </h2>

            <p class="subtitle">

                Enter your registered email address.

            </p>

            <input
                type="email"
                id="email"
                placeholder="Email Address"
            >

            <button id="sendBtn">

                Send OTP

            </button>

            <!-- OTP Section -->

            <div id="otpSection">

                <input
                    type="text"
                    id="otp"
                    maxlength="6"
                    placeholder="Enter OTP">

                <div class="password-box">

                    <input
                        type="password"
                        id="password"
                        placeholder="New Password">

                    <i
                    id="togglePassword"
                    class="bi bi-eye eye-btn"></i>

                </div>

                <div class="password-box">

                    <input
                        type="password"
                        id="confirmPassword"
                        placeholder="Confirm Password">

                    <i
                    id="toggleConfirm"
                    class="bi bi-eye eye-btn"></i>

                </div>

                <button id="resetBtn">

                    Reset Password

                </button>

            </div>

            <a href="/">

                ← Back to Login

            </a>

        </div>

    </div>

</div>

<!-- Toast -->

<div id="toast" class="toast"></div>

<script>

const sendBtn=document.getElementById("sendBtn");
const resetBtn=document.getElementById("resetBtn");

const otpSection=document.getElementById("otpSection");

const password=document.getElementById("password");
const confirm=document.getElementById("confirmPassword");

function showToast(message,type="success"){

    const toast=document.getElementById("toast");

    toast.innerHTML=message;

    toast.className="toast show";

    if(type==="success"){

        toast.classList.add("success");

    }

    else{

        toast.classList.add("error");

    }

    setTimeout(()=>{

        toast.className="toast";

    },3000);

}

/* Password Toggle */

document.getElementById("togglePassword").onclick=()=>{

    if(password.type==="password"){

        password.type="text";

        togglePassword.className="bi bi-eye-slash eye-btn";

    }

    else{

        password.type="password";

        togglePassword.className="bi bi-eye eye-btn";

    }

};

document.getElementById("toggleConfirm").onclick=()=>{

    if(confirm.type==="password"){

        confirm.type="text";

        toggleConfirm.className="bi bi-eye-slash eye-btn";

    }

    else{

        confirm.type="password";

        toggleConfirm.className="bi bi-eye eye-btn";

    }

};

/* Send OTP */

sendBtn.onclick=async()=>{

    const email=document.getElementById("email").value.trim();

    if(email===""){

        showToast("Please enter your email","error");

        return;

    }

    sendBtn.disabled=true;

    sendBtn.innerHTML="Sending...";

    try{

        const response=await fetch("/api/send-otp",{

            method:"POST",

            headers:{

                "Content-Type":"application/json"

            },

            body:JSON.stringify({email})

        });

        const result=await response.json();

        if(response.ok){

            otpSection.style.display="block";

            showToast("OTP Sent Successfully ✓");

        }

        else{

            showToast(result.detail,"error");

        }

    }

    catch{

        showToast("Server Error","error");

    }

    sendBtn.disabled=false;

    sendBtn.innerHTML="Send OTP";

};

</script>

</body>

</html>
