services:
  - type: web
    name: smart-inventory-optimization-system
    runtime: python
    plan: free

    buildCommand: |
      pip install -r requirements.txt
      python train_model.py

    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT

    envVars:
      - key: PYTHON_VERSION
        value: 3.11